[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm start"
  targetPort = 3000
  publish = "public"

[context.production.environment]
  REACT_APP_API_URL = "https://metin-6ryo.onrender.com/api"